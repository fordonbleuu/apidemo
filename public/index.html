<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD API - Item Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.2em;
            color: #1a73e8;
        }

        header p {
            color: #666;
            font-size: 1.1em;
        }

        .form-container {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        .form-container h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26,115,232,0.15);
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #1a73e8;
            color: #fff;
        }

        .btn-primary:hover {
            background: #1557b0;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #ccc;
        }

        .btn-edit {
            background: #34a853;
            color: #fff;
            padding: 6px 14px;
            font-size: 13px;
        }

        .btn-edit:hover {
            background: #2d8f47;
        }

        .btn-delete {
            background: #ea4335;
            color: #fff;
            padding: 6px 14px;
            font-size: 13px;
        }

        .btn-delete:hover {
            background: #c5221f;
        }

        .items-container {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .items-container h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        .item-card {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            transition: box-shadow 0.3s;
        }

        .item-card:hover {
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .item-name {
            font-size: 1.15em;
            font-weight: 600;
            color: #222;
        }

        .item-price {
            font-size: 1.15em;
            font-weight: 700;
            color: #1a73e8;
        }

        .item-description {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .item-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-category {
            display: inline-block;
            background: #e8f0fe;
            color: #1a73e8;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 500;
        }

        .item-actions {
            display: flex;
            gap: 6px;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 30px;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Item Manager</h1>
            <p>A simple CRUD application</p>
        </header>

        <div class="form-container">
            <h2 id="form-title">Add New Item</h2>
            <form id="item-form">
                <input type="hidden" id="item-id">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" rows="3"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="price">Price</label>
                        <input type="number" id="price" step="0.01" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <input type="text" id="category" placeholder="General">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" id="submit-btn" class="btn btn-primary">Add Item</button>
                    <button type="button" id="cancel-btn" class="btn btn-secondary" style="display:none">Cancel</button>
                </div>
            </form>
        </div>

        <div class="items-container">
            <h2>Items</h2>
            <div id="items-list">
                <p class="loading">Loading items...</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost/clifford/api/items';

        const form = document.getElementById('item-form');
        const formTitle = document.getElementById('form-title');
        const itemIdInput = document.getElementById('item-id');
        const nameInput = document.getElementById('name');
        const descriptionInput = document.getElementById('description');
        const priceInput = document.getElementById('price');
        const categoryInput = document.getElementById('category');
        const submitBtn = document.getElementById('submit-btn');
        const cancelBtn = document.getElementById('cancel-btn');
        const itemsList = document.getElementById('items-list');

        let isEditing = false;

        document.addEventListener('DOMContentLoaded', fetchItems);

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const itemData = {
                name: nameInput.value.trim(),
                description: descriptionInput.value.trim(),
                price: parseFloat(priceInput.value),
                category: categoryInput.value.trim() || 'General'
            };

            if (isEditing) {
                itemData.id = parseInt(itemIdInput.value);
                await updateItem(itemData);
            } else {
                await createItem(itemData);
            }
        });

        cancelBtn.addEventListener('click', resetForm);

        async function fetchItems() {
            try {
                const res = await fetch(API_BASE);
                const data = await res.json();
                renderItems(data.items);
            } catch (err) {
                itemsList.innerHTML = '<p class="empty-state">Error loading items. Make sure the API is running.</p>';
            }
        }

        function renderItems(items) {
            if (!items || items.length === 0) {
                itemsList.innerHTML = '<p class="empty-state">No items found. Add one above!</p>';
                return;
            }

            itemsList.innerHTML = items.map(item => `
                <div class="item-card">
                    <div class="item-header">
                        <span class="item-name">${escapeHtml(item.name)}</span>
                        <span class="item-price">$${parseFloat(item.price).toFixed(2)}</span>
                    </div>
                    ${item.description ? `<div class="item-description">${escapeHtml(item.description)}</div>` : ''}
                    <div class="item-meta">
                        <span class="item-category">${escapeHtml(item.category)}</span>
                        <div class="item-actions">
                            <button class="btn btn-edit" onclick="editItem(${item.id})">Edit</button>
                            <button class="btn btn-delete" onclick="deleteItem(${item.id})">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function createItem(data) {
            try {
                const res = await fetch(API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (res.ok) {
                    resetForm();
                    await fetchItems();
                } else {
                    alert(result.message || 'Failed to create item');
                }
            } catch (err) {
                alert('Error creating item');
            }
        }

        async function editItem(id) {
            try {
                const res = await fetch(`${API_BASE}/${id}`);
                const item = await res.json();

                if (res.ok) {
                    isEditing = true;
                    formTitle.textContent = 'Edit Item';
                    submitBtn.textContent = 'Update Item';
                    cancelBtn.style.display = 'inline-block';

                    itemIdInput.value = item.id;
                    nameInput.value = item.name;
                    descriptionInput.value = item.description || '';
                    priceInput.value = item.price;
                    categoryInput.value = item.category || '';

                    nameInput.focus();
                } else {
                    alert('Item not found');
                }
            } catch (err) {
                alert('Error fetching item');
            }
        }

        async function updateItem(data) {
            try {
                const res = await fetch(API_BASE, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (res.ok) {
                    resetForm();
                    await fetchItems();
                } else {
                    alert(result.message || 'Failed to update item');
                }
            } catch (err) {
                alert('Error updating item');
            }
        }

        async function deleteItem(id) {
            if (!confirm('Are you sure you want to delete this item?')) return;

            try {
                const res = await fetch(API_BASE, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });

                const result = await res.json();

                if (res.ok) {
                    await fetchItems();
                } else {
                    alert(result.message || 'Failed to delete item');
                }
            } catch (err) {
                alert('Error deleting item');
            }
        }

        function resetForm() {
            isEditing = false;
            formTitle.textContent = 'Add New Item';
            submitBtn.textContent = 'Add Item';
            cancelBtn.style.display = 'none';
            form.reset();
            itemIdInput.value = '';
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>
</html>
